version: "3.9"

services:
  backend:
    build: ./backend
    container_name: careerpilot-backend
    ports:
      - "8001:8001"
    env_file:
      - ./backend/.env
    volumes:
      - careerpilot_data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: careerpilot-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  careerpilot_data:
