services:
  backend:
    build: ./backend                         # 本地: docker compose up --build
    image: ghcr.io/yangming2002/careerpilot-ai/backend:latest  # 远端: docker compose pull
    container_name: careerpilot-backend
    ports:
      - "8001:8001"
    env_file:
      - ./backend/.env
    volumes:
      - backend_data:/app
    restart: unless-stopped

  frontend:
    build: ./frontend                       # 本地: docker compose up --build
    image: ghcr.io/yangming2002/careerpilot-ai/frontend:latest  # 远端: docker compose pull
    container_name: careerpilot-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
